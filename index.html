<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#0028D4" />
<title>Copilot Atendimento</title>
<link rel="manifest" href="manifest.json" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;900&family=Yellowtail&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg-light:   #F4F0E6; /* Off-white/Bege */
    --royal-blue: #0028D4; /* Azul Royal dominante */
    --gold:       #FFC000; /* Dourado/Amarelo */
    --text-dark:  #001575; /* Azul muito escuro para textos corridos */
    --white:      #FFFFFF;
    --border:     #0028D4; /* Bordas marcadas em azul */
    --radius:     4px;     /* Cantos menos arredondados, pegada mais rústica/urbana */
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    background: var(--bg-light);
    color: var(--text-dark);
    font-family: 'Montserrat', sans-serif;
    font-size: 14px;
    font-weight: 500;
    line-height: 1.6;
    overflow-x: hidden;
    position: relative;
    z-index: 1;
  }

  /* TEXTO REPETIDO NO FUNDO (PATTERN) */
  body::before {
    content: "COPILOT COPILOT COPILOT COPILOT COPILOT COPILOT COPILOT COPILOT COPILOT COPILOT COPILOT COPILOT COPILOT COPILOT COPILOT COPILOT COPILOT COPILOT COPILOT COPILOT ";
    position: fixed;
    top: -20%; left: -20%; right: -20%; bottom: -20%;
    z-index: -1;
    font-size: 12vw;
    font-weight: 900;
    color: var(--royal-blue);
    opacity: 0.03; /* Super sutil */
    line-height: 0.9;
    transform: rotate(-10deg);
    pointer-events: none;
    display: flex;
    flex-wrap: wrap;
    align-content: center;
    justify-content: center;
    overflow: hidden;
  }

  /* HEADER */
  header {
    background: var(--royal-blue);
    border-bottom: 6px solid var(--gold);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }

  .logo {
    font-weight: 900;
    font-size: 20px;
    color: var(--white);
    letter-spacing: 2px;
    text-transform: uppercase;
    transform: rotate(-3deg); /* Rotação/ângulo no logo */
    display: flex;
    align-items: center;
  }

  /* MISTURA COM SCRIPT */
  .logo .script-text {
    font-family: 'Yellowtail', cursive;
    color: var(--gold);
    text-transform: none;
    letter-spacing: normal;
    font-size: 26px;
    margin-right: 6px;
    transform: rotate(-8deg) translateY(-4px);
  }

  .logo span#header-nome {
    display: block;
    color: var(--gold);
    font-size: 10px;
    letter-spacing: 3px;
    margin-top: -4px;
  }

  .status-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #00FF66; /* Verde neon para contraste no azul */
    border: 2px solid var(--royal-blue);
  }

  /* CARDS (ESTÉTICA NEO-BRUTALISTA / STREET) */
  .card {
    background: var(--white);
    border: 3px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin: 20px;
    box-shadow: 6px 6px 0 var(--border); /* Sombra chapada */
    position: relative;
  }

  .card-title {
    font-size: 16px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--royal-blue);
    margin-bottom: 20px;
    border-bottom: 3px solid var(--border);
    padding-bottom: 10px;
    display: flex;
    align-items: center;
  }

  /* CHIPS */
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 16px;
  }

  .chip {
    padding: 8px 14px;
    border-radius: 0px; /* Quadrado */
    background: var(--white);
    color: var(--royal-blue);
    border: 2px solid var(--border);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    font-size: 11px;
    box-shadow: 2px 2px 0 var(--border);
    transition: all .1s ease-in-out;
  }

  .chip:hover,
  .chip.active {
    background: var(--royal-blue);
    color: var(--gold);
    transform: translate(2px, 2px);
    box-shadow: 0px 0px 0 var(--border);
  }

  /* BUTTONS */
  .btn {
    font-family: 'Montserrat', sans-serif;
    border: none;
    cursor: pointer;
    outline: none;
    transition: all 0.15s;
  }

  .btn-primary {
    background: var(--gold);
    color: var(--royal-blue);
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 2px;
    border: 3px solid var(--border);
    padding: 14px;
    font-size: 14px;
    box-shadow: 4px 4px 0 var(--border);
    display: block;
    width: 100%;
  }

  .btn-primary:hover:not(:disabled) {
    background: var(--royal-blue);
    color: var(--gold);
    transform: translate(2px, 2px);
    box-shadow: 2px 2px 0 var(--border);
  }

  .btn-primary:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .btn-ghost {
    background: transparent;
    color: var(--white);
    border: 2px solid var(--gold);
    padding: 6px 10px;
    font-weight: 700;
  }

  .btn-ghost:hover {
    background: var(--gold);
    color: var(--royal-blue);
  }

  /* INPUTS E TEXTAREAS */
  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--royal-blue);
    margin-bottom: 6px;
    font-size: 12px;
  }

  .field input,
  .field textarea,
  .form-input,
  .msg-area {
    width: 100%;
    background: var(--bg-light);
    border: 3px solid var(--border);
    color: var(--text-dark);
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    padding: 12px;
    font-size: 14px;
    border-radius: 0;
    margin-bottom: 12px;
    transition: box-shadow 0.2s;
  }

  .msg-area { height: 100px; resize: vertical; }

  .field input:focus,
  .field textarea:focus,
  .form-input:focus,
  .msg-area:focus {
    outline: none;
    box-shadow: 4px 4px 0 var(--gold);
    background: var(--white);
  }

  /* RESPOSTA GERADA */
  .resposta-wrapper {
    background: var(--royal-blue);
    border: 3px solid var(--border);
    padding: 20px;
    margin-top: 20px;
    box-shadow: 6px 6px 0 var(--gold);
    display: none;
    position: relative;
    transform: rotate(1deg); /* Leve inclinação pra atitude */
  }

  .resposta-label {
    font-weight: 900;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 10px;
    font-size: 12px;
  }

  .resposta-text {
    color: var(--white);
    font-size: 15px;
    line-height: 1.6;
    margin-bottom: 40px;
  }

  .copy-fab {
    position: absolute;
    bottom: 16px;
    right: 16px;
    background: var(--gold);
    color: var(--royal-blue);
    border: 2px solid var(--border);
    font-family: 'Montserrat', sans-serif;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 8px 16px;
    cursor: pointer;
    box-shadow: 2px 2px 0 var(--border);
  }

  .copy-fab:hover {
    background: var(--white);
    transform: translate(2px, 2px);
    box-shadow: 0px 0px 0 var(--border);
  }

  /* LISTA DE CONTATOS */
  .contato-item {
    border-bottom: 2px solid var(--border);
    padding: 12px 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .contato-item:last-child { border-bottom: none; }
  
  .ci-nome { font-weight: 900; color: var(--royal-blue); text-transform: uppercase; }
  .ci-tel { font-size: 12px; color: var(--text-dark); margin-bottom: 4px; }
  .ci-ped { font-size: 13px; font-weight: 600; }
  
  .status-badge {
    font-size: 10px;
    font-weight: 900;
    text-transform: uppercase;
    padding: 4px 8px;
    border: 2px solid var(--border);
  }

  .s-novo   { background: var(--white); color: var(--royal-blue); }
  .s-em     { background: var(--gold); color: var(--royal-blue); }
  .s-fin    { background: var(--royal-blue); color: var(--gold); }

  /* BOTTOM NAV */
  nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--royal-blue);
    border-top: 4px solid var(--border);
    display: flex;
    z-index: 100;
  }

  .nav-item {
    flex: 1;
    background: transparent;
    color: var(--white);
    border: none;
    border-right: 2px solid var(--border);
    padding: 12px 0;
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-size: 11px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .nav-item:last-child { border-right: none; }

  .nav-item .icon {
    font-size: 18px;
    margin-bottom: 4px;
  }

  .nav-item.active {
    background: var(--border);
    color: var(--gold);
  }

  .app-layout { padding-bottom: 80px; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0, 40, 212, 0.9); /* Fundo azul translúcido */
    z-index: 200;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    opacity: 0; pointer-events: none; transition: opacity .2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--bg-light);
    border: 4px solid var(--border);
    padding: 24px;
    width: 100%; max-width: 480px;
    max-height: 90vh; overflow-y: auto;
    box-shadow: 8px 8px 0 var(--border);
    transform: rotate(2deg); /* Modal levemente torto */
  }

  .modal-title {
    font-size: 20px; font-weight: 900; margin-bottom: 20px;
    color: var(--royal-blue); letter-spacing: 2px; text-transform: uppercase;
    border-bottom: 4px solid var(--gold); padding-bottom: 10px;
  }

  .modal-close {
    float: right; cursor: pointer; color: var(--text-dark);
    font-size: 24px; line-height: 1; font-weight: bold;
  }
  .modal-close:hover { color: var(--gold); }

  /* TOAST */
  .toast {
    position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-20px);
    background: var(--white); border: 3px solid var(--border);
    color: var(--royal-blue); font-weight: 900; text-transform: uppercase;
    padding: 12px 24px; box-shadow: 4px 4px 0 var(--gold);
    opacity: 0; pointer-events: none; transition: all .3s;
    z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* LOADER */
  .loader { display: none; text-align: center; margin: 20px 0; font-weight: 900; color: var(--royal-blue); text-transform: uppercase; letter-spacing: 2px;}
  .loader.show { display: block; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="script-text">The</span> Copilot
    <div style="margin-left:8px;">
      <span id="header-nome">Atendimento</span>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:16px;">
    <div class="status-dot" id="status-dot" title="Conectado"></div>
    <button class="btn btn-ghost" onclick="abrirConfig()">SET</button>
  </div>
</header>

<div id="setup-screen">
  <div class="card" style="margin-top:40px; transform: rotate(-1deg);">
    <div class="card-title">INICIAR SISTEMA</div>
    <p style="margin-bottom:20px; font-weight: 600;">Configure os dados do negócio. Salve apenas uma vez.</p>

    <div class="field"><label>URL do Web App (GAS)</label><input id="s-gasurl" type="url" placeholder="https://script.google.com/..."/></div>
    <div class="field"><label>Nome do Negócio</label><input id="s-nome" placeholder="Ex: THE BURGER"/></div>
    <div class="field"><label>Horário de Funcionamento</label><input id="s-horario" placeholder="Ex: Seg a Dom, 18h às 23h"/></div>
    <div class="field"><label>Telefone/WhatsApp</label><input id="s-tel" type="tel" placeholder="(31) 9xxxx-xxxx"/></div>
    <div class="field"><label>Cardápio resumido</label><textarea id="s-cardapio" placeholder="Smash R$18, Duplo R$25..."></textarea></div>

    <button class="btn btn-primary" onclick="salvarSetup()">SALVAR E ENTRAR</button>
  </div>
</div>

<div id="app-screen" style="display:none;">
  <div class="app-layout">

    <div id="panel-resposta">
      <div class="card">
        <div class="card-title">GERAR RESPOSTA I.A.</div>
        <div class="chips" id="chips-container">
          <span class="chip" onclick="useChip(this,'Qual o cardápio?')">Cardápio</span>
          <span class="chip" onclick="useChip(this,'Faz entrega?')">Entrega</span>
          <span class="chip" onclick="useChip(this,'Qual o horário?')">Horário</span>
          <span class="chip" onclick="useChip(this,'Quero fazer um pedido')">Pedido</span>
          <span class="chip" onclick="useChip(this,'Vocês aceitam cartão?')">Pagamento</span>
          <span class="chip" onclick="useChip(this,'Qual o endereço de entrega?')">Endereço</span>
        </div>
        <textarea class="msg-area" id="msg-input" placeholder="COLE A MENSAGEM DO CLIENTE AQUI..."></textarea>
        <input class="form-input" id="ctx-extra" placeholder="Contexto extra (Ex: VIP, atrasado)" />
        <button class="btn btn-primary" id="btn-gerar" onclick="gerarResposta()">
          GERAR RESPOSTA
        </button>
        <div class="loader" id="loader-ia">PROCESSANDO...</div>
        <div class="resposta-wrapper" id="resposta-wrapper">
          <div class="resposta-label">RESPOSTA SUGERIDA</div>
          <div class="resposta-text" id="resposta-text"></div>
          <button class="copy-fab" onclick="copiarResposta()">COPIAR</button>
        </div>
      </div>
    </div>

    <div id="panel-contato" style="display:none;">
      <div class="card">
        <div class="card-title">REGISTRAR CONTATO</div>
        <div class="form-grid">
          <div class="field"><label>NOME</label><input class="form-input" id="c-nome" /></div>
          <div class="field"><label>WHATSAPP</label><input class="form-input" id="c-tel" /></div>
          <div class="field"><label>ASSUNTO</label><input class="form-input form-full" id="c-assunto" /></div>
          <div class="field"><label>STATUS</label>
            <select class="form-input" id="c-status">
              <option value="Novo">NOVO</option>
              <option value="Em atendimento">ATENDENDO</option>
              <option value="Finalizado">FINALIZADO</option>
            </select>
          </div>
          <div class="field"><label>OBSERVAÇÕES</label><input class="form-input" id="c-obs" /></div>
        </div>
        <button class="btn btn-primary" onclick="salvarContato()">SALVAR CONTATO</button>
      </div>
    </div>

    <div id="panel-lista" style="display:none;">
      <div class="card">
        <div class="card-title" style="justify-content:space-between; margin-bottom: 0; border-bottom: none;">
          <span>CONTATOS RECENTES</span>
          <button class="btn btn-ghost" onclick="carregarContatos()" style="color:var(--royal-blue); border-color:var(--royal-blue)">ATUALIZAR</button>
        </div>
        <div id="lista-wrapper" style="margin-top: 16px; border-top: 3px solid var(--border); padding-top: 16px;">
          <p style="color:var(--text-dark);font-size:13px;text-align:center;padding:20px 0; font-weight:bold;">Clique em Atualizar para carregar.</p>
        </div>
      </div>
    </div>

  </div>

  <nav>
    <button class="nav-item active" id="nav-resposta" onclick="showPanel('resposta')">
      <div class="icon">💬</div>Resposta
    </button>
    <button class="nav-item" id="nav-contato" onclick="showPanel('contato')">
      <div class="icon">➕</div>Contato
    </button>
    <button class="nav-item" id="nav-lista" onclick="showPanel('lista')">
      <div class="icon">📋</div>Lista
    </button>
  </nav>
</div>

<div class="modal-overlay" id="config-modal">
  <div class="modal">
    <div class="modal-close" onclick="fecharConfig()">×</div>
    <div class="modal-title">CONFIGURAÇÕES</div>
    <div class="field"><label>URL do Web App</label><input id="cfg-gasurl" type="url" /></div>
    <div class="field"><label>Nome do Negócio</label><input id="cfg-nome" /></div>
    <div class="field"><label>Horário</label><input id="cfg-horario" /></div>
    <div class="field"><label>Telefone</label><input id="cfg-tel" type="tel" /></div>
    <div class="field"><label>Cardápio</label><textarea id="cfg-cardapio" style="height: 80px;"></textarea></div>
    <button class="btn btn-primary" onclick="salvarConfig()">SALVAR</button>
    <button class="btn btn-ghost" style="margin-top:12px; width: 100%; border-color: red; color: red;" onclick="limparDados()">REDEFINIR SISTEMA</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── STORAGE ──
  const S = {
    get: k => { try { return JSON.parse(localStorage.getItem(k)); } catch{ return null; } },
    set: (k,v) => localStorage.setItem(k, JSON.stringify(v)),
    del: k => localStorage.removeItem(k),
  };
  const CFG_KEY = 'copilot_cfg';

  // ── INIT ──
  window.onload = () => {
    const cfg = S.get(CFG_KEY);
    if (cfg && cfg.gasUrl) {
      entrarApp(cfg);
    } else {
      document.getElementById('setup-screen').style.display = 'block';
    }
  };

  function salvarSetup() {
    const cfg = {
      gasUrl:   document.getElementById('s-gasurl').value.trim(),
      nome:     document.getElementById('s-nome').value.trim(),
      horario:  document.getElementById('s-horario').value.trim(),
      telefone: document.getElementById('s-tel').value.trim(),
      cardapio: document.getElementById('s-cardapio').value.trim(),
    };
    if (!cfg.gasUrl) { toast('⚠️ Cole a URL do Web App'); return; }
    S.set(CFG_KEY, cfg);
    entrarApp(cfg);
  }

  function entrarApp(cfg) {
    document.getElementById('header-nome').textContent = cfg.nome || 'ATENDIMENTO';
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('app-screen').style.display   = 'block';
    pingGas(cfg.gasUrl);
  }

  async function pingGas(url) {
    try {
      const r = await fetch(url + '?acao=ping');
      const j = await r.json();
      if (j.ok) {
        document.getElementById('status-dot').style.background = '#00FF66';
        document.getElementById('status-dot').title = 'Conectado ✅';
      }
    } catch {
      document.getElementById('status-dot').style.background = '#FF0033';
      document.getElementById('status-dot').title = 'Offline ⚠️';
    }
  }

  // ── PANELS ──
  function showPanel(name) {
    ['resposta','contato','lista'].forEach(p => {
      document.getElementById('panel-'+p).style.display = p===name?'block':'none';
      document.getElementById('nav-'+p).classList.toggle('active', p===name);
    });
    if (name === 'lista') carregarContatos();
  }

  // ── CHIPS ──
  function useChip(el, texto) {
    document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('msg-input').value = texto;
  }

  // ── GERAR RESPOSTA ──
  async function gerarResposta() {
    const msg = document.getElementById('msg-input').value.trim();
    if (!msg) { toast('⚠️ Escreva a mensagem do cliente'); return; }

    const cfg = S.get(CFG_KEY);
    if (!cfg?.gasUrl) { toast('⚠️ Configure o sistema primeiro'); return; }

    document.getElementById('btn-gerar').disabled = true;
    document.getElementById('loader-ia').classList.add('show');
    document.getElementById('resposta-wrapper').style.display = 'none';

    try {
      const r = await fetch(cfg.gasUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          acao: 'gerar_resposta',
          mensagem: msg,
          contexto: document.getElementById('ctx-extra').value
        })
      });
      const j = await r.json();
      const texto = j?.data?.resposta || '⚠️ Sem resposta.';
      document.getElementById('resposta-text').textContent = texto;
      document.getElementById('resposta-wrapper').style.display = 'block';
    } catch(e) {
      toast('❌ Erro ao conectar ao sistema');
    } finally {
      document.getElementById('btn-gerar').disabled = false;
      document.getElementById('loader-ia').classList.remove('show');
    }
  }

  function copiarResposta() {
    const t = document.getElementById('resposta-text').textContent;
    navigator.clipboard.writeText(t).then(() => {
      toast('Copiado para área de transferência!');
      document.querySelector('.copy-fab').textContent = 'COPIADO!';
      setTimeout(() => document.querySelector('.copy-fab').textContent = 'COPIAR', 2000);
    });
  }

  // ── SALVAR CONTATO ──
  async function salvarContato() {
    const cfg = S.get(CFG_KEY);
    if (!cfg?.gasUrl) { toast('⚠️ Configure o sistema'); return; }

    const dados = {
      acao:     'salvar_contato',
      nome:     document.getElementById('c-nome').value,
      telefone: document.getElementById('c-tel').value,
      assunto:  document.getElementById('c-assunto').value,
      status:   document.getElementById('c-status').value,
      obs:      document.getElementById('c-obs').value,
    };
    if (!dados.nome && !dados.telefone) { toast('⚠️ Informe nome ou telefone'); return; }

    try {
      const r = await fetch(cfg.gasUrl, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(dados) });
      const j = await r.json();
      if (j.ok) {
        toast('Contato salvo com sucesso!');
        ['c-nome','c-tel','c-assunto','c-obs'].forEach(id => document.getElementById(id).value='');
      }
    } catch { toast('❌ Erro ao salvar'); }
  }

  // ── LISTA ──
  async function carregarContatos() {
    const cfg = S.get(CFG_KEY);
    if (!cfg?.gasUrl) return;
    const box = document.getElementById('lista-wrapper');
    box.innerHTML = '<p style="text-align:center; font-weight:bold; color:var(--royal-blue); padding:20px;">CARREGANDO...</p>';

    try {
      const r    = await fetch(cfg.gasUrl, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ acao:'listar_contatos' }) });
      const j    = await r.json();
      const list = j?.data || [];

      if (!list.length) { box.innerHTML = '<p style="text-align:center; padding:20px;">Nenhum contato ainda.</p>'; return; }

      box.innerHTML = list.slice(0,30).map(c => {
        const sc = c['Status'] === 'Novo' ? 's-novo' : c['Status'] === 'Em atendimento' ? 's-em' : 's-fin';
        return `<div class="contato-item">
          <div>
            <div class="ci-nome">${c['Nome']||'Sem nome'}</div>
            <div class="ci-tel">${c['Telefone']||'—'}</div>
            <div class="ci-ped">${c['Pedido / Assunto']||''}</div>
          </div>
          <span class="status-badge ${sc}">${c['Status']}</span>
        </div>`;
      }).join('');
    } catch {
      box.innerHTML = '<p style="color:red; text-align:center; font-weight:bold; padding:20px;">ERRO AO CARREGAR</p>';
    }
  }

  // ── CONFIG MODAL ──
  function abrirConfig() {
    const cfg = S.get(CFG_KEY) || {};
    document.getElementById('cfg-gasurl').value   = cfg.gasUrl   || '';
    document.getElementById('cfg-nome').value     = cfg.nome     || '';
    document.getElementById('cfg-horario').value  = cfg.horario  || '';
    document.getElementById('cfg-tel').value      = cfg.telefone || '';
    document.getElementById('cfg-cardapio').value = cfg.cardapio || '';
    document.getElementById('config-modal').classList.add('open');
  }
  function fecharConfig() { document.getElementById('config-modal').classList.remove('open'); }
  function salvarConfig() {
    const cfg = {
      gasUrl:   document.getElementById('cfg-gasurl').value.trim(),
      nome:     document.getElementById('cfg-nome').value.trim(),
      horario:  document.getElementById('cfg-horario').value.trim(),
      telefone: document.getElementById('cfg-tel').value.trim(),
      cardapio: document.getElementById('cfg-cardapio').value.trim(),
    };
    S.set(CFG_KEY, cfg);
    entrarApp(cfg);
    fecharConfig();
    toast('Configurações salvas!');
  }
  function limparDados() {
    if (!confirm('Tem certeza? Isso apagará os dados do app.')) return;
    S.del(CFG_KEY);
    location.reload();
  }

  // ── TOAST ──
  let _toastTimer;
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
  }
</script>
</body>
</html>
